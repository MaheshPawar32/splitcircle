<style>

    min-height: 100vh;

  p { margin: 0 0 28px; color: #6B7280; }
  a.btn {
    display: block; padding: 14px 18px; margin: 10px 0;

    text-decoration: none; font-weight: 500;
    transition: all .15s;
  }
  a.btn:hover {
    background: #6366F1; color: #fff; border-color: #6366F1;
